<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link rel="stylesheet" href="style.css">
</head>
<body onload="initProfile(); loadTheme(); loadNotif();">

<div class="topbar">
    <div class="left-side">
        <div class="profile">
            <img src="images/profile.png" class="avatar" alt="User">
            <div class="user-info">
                <div id="username"></div>
                <div id="role"></div>
            </div>
        </div>
        <div class="notif" onclick="go('notifications.html')">🔔 <span id="notifCount">0</span></div>
    </div>

    <div class="center-logo">
        <img src="images/nulogo.png" class="logo" alt="NU Logo">
    </div>

    <div class="right-side">
        <button class="logout-btn" type="button" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="container">
    <h2>👤 My Profile</h2>

    <div class="profile-card">
        <p id="name"></p>
        <p id="roleText"></p>
        <p id="posts"></p>
        <p id="likes"></p>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html">🏠<span>Home</span></a>
    <a href="needhelp.html">📚<span>Help</span></a>
    <a href="NU-Share.html">🎒<span>Items</span></a>
    <a href="communities.html">💬<span>Chat</span></a>
    <a href="profile.html">👤<span>Profile</span></a>
</div>

<script src="script.js"></script>
<script>
function initProfile() {
    let user = requireUser();
    if (!user) return;

    document.getElementById("username").innerText = user.name;
    document.getElementById("role").innerText = user.role;
    document.getElementById("name").innerText = "Name: " + user.name;
    document.getElementById("roleText").innerText = "Role: " + user.role;

    let posts = JSON.parse(localStorage.getItem("posts")) || [];
    let myPosts = posts.filter(function(p) {
        return p.user === user.name;
    });

    let likes = 0;
    myPosts.forEach(function(p) {
        likes += p.likes || 0;
    });

    document.getElementById("posts").innerText = "Posts: " + myPosts.length;
    document.getElementById("likes").innerText = "Total Likes: " + likes;
}
</script>
</body>
</html>
