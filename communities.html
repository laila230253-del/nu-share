<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Communities</title>
<link rel="stylesheet" href="style.css">
</head>
<body onload="initCommunities(); loadTheme(); loadNotif();">

<div class="topbar">
    <div class="left-side">
        <div class="profile">
            <img src="images/profile.png" class="avatar" alt="User Avatar">
            <div class="user-info">
                <div id="username"></div>
                <div id="role"></div>
            </div>
        </div>
        <div class="notif" onclick="go('notifications.html')">🔔 <span id="notifCount">0</span></div>
    </div>
    <div class="center-logo">
        <img src="images/nulogo.png" class="logo" alt="NU Logo">
    </div>
    <div class="right-side">
        <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="container">
    <h2>💬 Communities</h2>
    <div class="community-list">
        <div class="group" onclick="openCommunity('ITMB')">📘 ITMB</div>
        <div class="group" onclick="openCommunity('Engineering')">⚙️ Engineering</div>
        <div class="group" onclick="openCommunity('AI')">🤖 Artificial Intelligence - AI</div>
    </div>
</div>

<div class="bottom-nav">
    <a href="index.html">🏠<span>Home</span></a>
    <a href="needhelp.html">📚<span>Help</span></a>
    <a href="NU-Share.html">🎒<span>Items</span></a>
    <a href="communities.html">💬<span>Chat</span></a>
    <a href="profile.html">👤<span>Profile</span></a>
</div>

<script src="script.js"></script>
<script>
function initCommunities() {
    let user = requireUser();
    if (!user) return;
    document.getElementById("username").innerText = user.name;
    document.getElementById("role").innerText = user.role;
}

function openCommunity(name) {
    localStorage.setItem("community", name);
    window.location.href = "community.html";
}
</script>
</body>
</html>
