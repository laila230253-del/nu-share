<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Announcements</title>
<link rel="stylesheet" href="style.css">
</head>
<body onload="initAnnouncements(); loadTheme(); loadNotif();">

<div class="topbar">
    <div class="left-side">
        <div class="profile">
            <img src="images/profile.png" class="avatar" alt="User">
            <div class="user-info">
                <div id="username"></div>
                <div id="role"></div>
            </div>
        </div>
        <div class="notif" onclick="go('notifications.html')">🔔 <span id="notifCount">0</span></div>
    </div>

    <div class="center-logo">
        <img src="images/nu_logo 2.png" class="logo" alt="NU Logo">
    </div>

    <div class="right-side">
        <button class="logout-btn" type="button" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="notify" id="notify"></div>

<div class="container">
    <h2>📢 Announcements</h2>

    <div class="actions" style="justify-content:center;">
        <button type="button" onclick="setFilter('all')">All</button>
        <button type="button" onclick="setFilter('exam')">📚 Exam</button>
        <button type="button" onclick="setFilter('event')">🎉 Event</button>
        <button type="button" onclick="setFilter('important')">⚠ Important</button>
    </div>

    <div class="box">
        <input id="text" placeholder="Write announcement...">
        <select id="type">
            <option value="exam">📚 Exam</option>
            <option value="event">🎉 Event</option>
            <option value="important">⚠ Important</option>
        </select>
        <button type="button" onclick="addAnnouncement()">Post</button>
    </div>

    <div id="list"></div>
</div>

<div class="bottom-nav">
    <a href="index.html">🏠<span>Home</span></a>
    <a href="needhelp.html">📚<span>Help</span></a>
    <a href="NU-Share.html">🎒<span>Items</span></a>
    <a href="communities.html">💬<span>Chat</span></a>
    <a href="profile.html">👤<span>Profile</span></a>
</div>

<script src="script.js"></script>
<script>
let currentFilter = "all";

function initAnnouncements() {
    let user = requireUser();
    if (!user) return;

    document.getElementById("username").innerText = user.name;
    document.getElementById("role").innerText = user.role;
    displayAnnouncements();
}

function showNotify(msg) {
    let n = document.getElementById("notify");
    n.innerText = msg;
    n.style.display = "block";

    setTimeout(function() {
        n.style.display = "none";
    }, 2500);
}

function addAnnouncement() {
    let user = getCurrentUser();

    if (!user || user.role !== "admin") {
        alert("Only admin can post announcements!");
        return;
    }

    let text = document.getElementById("text").value.trim();
    let type = document.getElementById("type").value;

    if (text === "") {
        alert("Please write announcement!");
        return;
    }

    let arr = JSON.parse(localStorage.getItem("ann")) || [];

    arr.unshift({
        text: text,
        type: type,
        user: user.name,
        time: new Date().toLocaleString()
    });

    localStorage.setItem("ann", JSON.stringify(arr));
    addNotification("New announcement added");
    document.getElementById("text").value = "";
    showNotify("📢 New announcement added!");
    displayAnnouncements();
}

function displayAnnouncements() {
    let arr = JSON.parse(localStorage.getItem("ann")) || [];
    let list = document.getElementById("list");
    let user = getCurrentUser();

    list.innerHTML = "";

    let filtered = arr.filter(function(a) {
        return currentFilter === "all" ? true : a.type === currentFilter;
    });

    if (filtered.length === 0) {
        list.innerHTML = `<div class="empty-msg">No announcements found.</div>`;
        return;
    }

    filtered.forEach(function(a) {
        let originalIndex = arr.indexOf(a);
        let tagText = a.type === "exam" ? "📚 Exam" : a.type === "event" ? "🎉 Event" : "⚠ Important";

        list.innerHTML += `
            <div class="announcement-card">
                <span class="tag ${a.type}">${tagText}</span>
                <div><b>${a.user}</b></div>
                <div class="meta">${a.time}</div>
                <p>${a.text}</p>
                ${(a.user === user.name || user.role === "admin") ? `<div class="actions"><button type="button" class="delete-btn" onclick="deleteAnnouncement(${originalIndex})">Delete</button></div>` : ""}
            </div>
        `;
    });
}

function deleteAnnouncement(i) {
    let arr = JSON.parse(localStorage.getItem("ann")) || [];
    let user = getCurrentUser();

    if (arr[i].user !== user.name && user.role !== "admin") {
        alert("Access denied!");
        return;
    }

    arr.splice(i, 1);
    localStorage.setItem("ann", JSON.stringify(arr));
    showNotify("Deleted successfully");
    displayAnnouncements();
}

function setFilter(type) {
    currentFilter = type;
    displayAnnouncements();
}
</script>
</body>
</html>
