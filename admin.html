<title>Admin Panel</title>
<link rel="stylesheet" href="style.css">
</head>
<body onload="loadAdmin(); loadTheme();">

<div class="topbar">
    <div class="left-side">
        <div class="profile">
            <img src="images/profile.png" class="avatar" alt="Admin Avatar">
            <div class="user-info">
                <div id="username"></div>
                <div id="role"></div>
            </div>
        </div>
    </div>

    <div class="center-logo">
        <img src="images/nulogo.png" class="logo" alt="NU Logo">
    </div>

    <div class="right-side">
        <button class="logout-btn" type="button" onclick="logout()">🚪 Logout</button>
    </div>
</div>

<div class="container">
    <h1>🛡 Admin Panel</h1>
    <p id="adminName"></p>

    <h3>Users</h3>
    <div id="usersList"></div>
</div>
