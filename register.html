<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NU-Share Register</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="NU Share">
<link rel="apple-touch-icon" href="images/icon.png">
<link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="container">
    <img src="images/nulogo.png" class="logo" alt="Logo">

    <h1 class="title">nu-share</h1>
    <p class="subtitle">Create your account</p>

    <div class="form-box">
        <input type="text" id="name" placeholder="Full Name">
        <input type="email" id="email" placeholder="University Email">
        <input type="password" id="password" placeholder="Password">

        <!-- student only -->
        <input type="hidden" id="role" value="student">

        <button type="button" onclick="register()">Register</button>
    </div>

    <p class="register">
        Already have an account?
        <a href="login.html">Login</a>
    </p>
</div>

<script src="script.js"></script>
</body>
</html>
